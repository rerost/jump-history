name: Tests

on:
  push:
    branches:
      - '**'  # すべてのブランチでテストを実行

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Linuxの場合、テストに必要な追加依存関係をインストール
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    # Linuxの場合、xvfbを使用してテストを実行
    - name: Run tests (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run -a npm test
